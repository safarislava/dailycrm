services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: crm
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: crm_minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: crm_mailpit
    restart: always
    ports:
      - "8025:8025"

  backend:
    build: ./Backend
    container_name: crm_backend
    restart: always
    depends_on:
      - postgres
      - minio
      - mailpit
    environment:
      DATABASE_URL: postgres://admin:admin@postgres:5432/crm
      JWT_SECRET: change-me-in-production
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USERNAME: test
      SMTP_PASSWORD: test
      MAIL_FROM: CRM <noreply@crm.local>

  frontend:
    build: ./Frontend
    container_name: crm_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  minio_data: